version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      # DB and trained models persist across restarts
      - ./fridge2fork.db:/app/fridge2fork.db
      - ./models:/app/models
    environment:
      - DATABASE_URL=sqlite:///./fridge2fork.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
